services:
  postgres:
    image: postgres:16-alpine
    container_name: medvision-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medvision
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - medvision-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medvision"]
      interval: 10s
      timeout: 5s
      retries: 5
 
volumes:
  medvision-postgres-data:
